name: Build and push Docker images

on:
  push:
    branches: [main]
    paths:
      - 'Containers/**'
    tags:
      - 'v*'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/xray-mikrotik
  XRAY_VERSION: v26.3.27
  TUN2SOCKS_VERSION: v2.6.0

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./Containers
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            XRAY_VERSION=${{ env.XRAY_VERSION }}
            TUN2SOCKS_VERSION=${{ env.TUN2SOCKS_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            xray.version=${{ env.XRAY_VERSION }}
            tun2socks.version=${{ env.TUN2SOCKS_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
