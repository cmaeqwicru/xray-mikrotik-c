name: Build and push Docker images

on:
  push:
    branches: [main]
    paths:
      - 'Containers/**'
  workflow_dispatch:
  schedule:
    # Каждый понедельник в 04:00 UTC — подхватить новые релизы Xray/tun2socks
    - cron: '0 4 * * 1'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/xray-mikrotik

jobs:
  get-versions:
    runs-on: ubuntu-latest
    outputs:
      xray_version: ${{ steps.xray.outputs.version }}
      tun2socks_version: ${{ steps.tun2socks.outputs.version }}
    steps:
      - name: Последняя версия Xray-core
        id: xray
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/XTLS/Xray-core/releases/latest \
            | jq -r .tag_name)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Xray-core: ${VERSION}"

      - name: Последняя версия tun2socks
        id: tun2socks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/xjasonlyu/tun2socks/releases/latest \
            | jq -r .tag_name)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tun2socks: ${VERSION}"

  build:
    needs: get-versions
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./Containers
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            XRAY_VERSION=${{ needs.get-versions.outputs.xray_version }}
            TUN2SOCKS_VERSION=${{ needs.get-versions.outputs.tun2socks_version }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ needs.get-versions.outputs.xray_version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            xray.version=${{ needs.get-versions.outputs.xray_version }}
            tun2socks.version=${{ needs.get-versions.outputs.tun2socks_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
